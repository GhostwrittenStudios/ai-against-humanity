name: Build AI Against Humanity

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --omit=optional

      - name: Build Windows
        if: runner.os == 'Windows'
        run: npm run dist -- --win

      - name: Build macOS
        if: runner.os == 'macOS'
        run: npm run dist -- --mac

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}
          path: releases/**